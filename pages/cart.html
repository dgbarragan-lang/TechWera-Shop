<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>TechWear Shop — Carrito</title>
    <link rel="icon" href="../img/logo/icon.png" type"image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <div class="site-container">
      <header class="site-header">
        <div class="container header-inner">
          <a class="brand" href="../index.html"
            ><img src="../img/logo/logo.png" alt="logo de TechWear Shop" /> TechWear
            Shop</a
          >
          <nav aria-label="Principal">
            <ul class="nav">
              <li><a href="../index.html"> <i class="fa-solid fa-house"></i> Inicio</a></li>
              <li>
                <a href="cart.html"
                  ><i class="fa-solid fa-cart-shopping"></i>  Carrito
                  </a
                >
              </li>
              <li><a href="login.html" class="btn btn-ghost"><i class="fa-solid fa-user"></i> Ingresar</a></li>
            </ul>
          </nav>
        </div>
      </header>

      <main class="container cart-page">
        <h2>Carrito de compras</h2>
        <label for="checkout-progress">Progreso del pedido</label>
        <progress id="checkout-progress" value="33" max="100">33%</progress>
        <label> Selecciona tu ubicación </label>

                <button style="margin-left: 16px; margin-top: 16px;
                width: 60px; height: 40px; border-radius: 12px;
                border: 2px solid gray; font-size: 24px;
                background-color: white;
                font-family: Arial, Helvetica, sans-serif;">

                    <a href="https://www.google.com/maps" target="_blank"
                    style="text-decoration: none; color: rgb(28, 28, 91);">
                        <i class="fa-solid fa-location-dot"></i>
                    </a>
                </button>
                <br>
                <br>
        <div class="cart-layout">
          <section class="cart-items">
            <article class="cart-item">
              <div class="img-wrap">
                <img
                src="../img/Carrito/dell.jpg"
                alt="Dell XPS 15"
                />
              </div>
              <div class="item-info">
                <h3>Dell XPS 15</h3>
                <p class="muted">Portátiles</p>
                <p class="price">$1899</p>
              </div>
              <div class="qty-controls" aria-label="Cantidad">
                <button class="qty">-</button>
                <span class="count">1</span>
                <button class="qty">+</button>
              </div>
            </article>
          </section>

          <aside class="order-summary">
            <h3>Resumen del pedido</h3>
            <dl>
              <div class="line">
                <dt>Subtotal</dt>
                <dd>$1899.00</dd>
              </div>
              <div class="line">
                <dt>Impuesto (10%)</dt>
                <dd>$189.90</dd>
              </div>
              <div class="line total">
                <dt>Total</dt>
                <dd>$2088.90</dd>
              </div>
            </dl>
            <button class="btn">Proceder al pago</button>
          </aside>
        </div>
      </main>

      <footer class="site-footer">
        <div class="container">
          <p>&copy; 2026 TechWear Shop. All rights reserved.</p>
        </div>
      </footer>
    </div>
  </body>
</html>
