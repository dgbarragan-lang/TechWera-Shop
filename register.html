<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>TechWear Shop — Registrarse</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="site-container">
      <header class="site-header">
        <div class="container header-inner">
          <a class="brand" href="index.html"
            ><img src="img/logo/logo.png" alt="logo de TechWear Shop" /> TechWear
            Shop</a
          >
          <nav aria-label="Principal">
            <ul class="nav">
              <li><a href="index.html">Inicio</a></li>
              <li>
                <a href="cart.html" class="cart-link"
                  ><img src="img/Carrito/carrito.png" alt="carrito" /> Carrito</a
                >
              </li>
              <li><a href="login.html" class="btn btn-ghost">Ingresar</a></li>
            </ul>
          </nav>
        </div>
      </header>

      <main class="container">
        <section class="register-card">
          <h2>Crear una cuenta</h2>
          <hr class="divider" />
          <form action="login.html" method="get" class="form-grid">
            <div>
              <label for="first">Nombre</label>
              <input id="first" name="first" type="text" required />
            </div>
            <div>
              <label for="last">Apellido</label>
              <input id="last" name="last" type="text" required />
            </div>

            <div>
              <label for="email">Correo electrónico</label>
              <input id="email" name="email" type="email" required />
            </div>
            <div>
              <label for="phone">Teléfono</label>
              <input
                id="phone"
                name="phone"
                type="tel"
                placeholder="+593 555 555 5555"
              />
            </div>

            <div>
              <label for="password">Contraseña</label>
              <input id="password" name="password" type="password" required />
            </div>
            <div>
              <label for="confirm">Confirmar contraseña</label>
              <input id="confirm" name="confirm" type="password" required />
            </div>

            <div class="full">
              <label for="company">Empresa</label>
              <input id="company" name="company" type="text" />
            </div>

            <div class="full">
              <label for="address1">Dirección 1</label>
              <input id="address1" name="address1" type="text" />
            </div>
            <div class="full">
              <label for="address2">Dirección 2</label>
              <input id="address2" name="address2" type="text" />
            </div>

            <div>
              <label for="city">Ciudad</label>
              <input id="city" name="city" type="text" />
            </div>
            <div>
              <label for="state">Provincia / Estado</label>
              <input id="state" name="state" type="text" />
            </div>

            <div>
              <label for="zip">Código postal</label>
              <input id="zip" name="zip" type="text" />
            </div>
            <div>
              <label for="country">País</label>
              <select id="country" name="country">
                <option value="">Selecciona un país</option>
                <option value="US">Ecuador</option>
                <option value="ES">España</option>
                <option value="UK">Estados Unidos</option>
                <option value="OTHER">Otro</option>
              </select>
            </div>

            <div>
              <label for="dob">Fecha de nacimiento</label>
              <input id="dob" name="dob" type="date" />
            </div>

            <div class="full">
              <label
                ><input type="checkbox" name="newsletter" /> Suscribirse al
                boletín</label
              >
            </div>

            <div class="full">
              <label
                ><input type="checkbox" name="terms" required /> Acepto los
                términos y la política de privacidad</label
              >
            </div>

            <div class="full">
              <button class="btn" type="submit">Crear cuenta</button>
            </div>
          </form>
          <hr class="divider" />
        </section>
      </main>

      <footer class="site-footer">
        <div class="container">
          <p>© 2026 TechWear Shop. All rights reserved.</p>
        </div>
      </footer>
    </div>
  </body>
</html>
