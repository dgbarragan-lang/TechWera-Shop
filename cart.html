<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>TechWear Shop — Carrito</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="site-container">
      <header class="site-header">
        <div class="container header-inner">
          <a class="brand" href="index.html"
            ><img src="img/logo/logo.png" alt="logo de TechWear Shop" /> TechWear
            Shop</a
          >
          <nav aria-label="Principal">
            <ul class="nav">
              <li><a href="index.html">Inicio</a></li>
              <li>
                <a href="cart.html" class="cart-link"
                  ><img src="img/Carrito/carrito.png" alt="carrito" /> Carrito
                  <span class="badge">1</span></a
                >
              </li>
              <li><a href="login.html" class="btn btn-ghost">Ingresar</a></li>
            </ul>
          </nav>
        </div>
      </header>

      <main class="container cart-page">
        <h2>Carrito de compras</h2>
        <div class="cart-layout">
          <section class="cart-items">
            <article class="cart-item">
              <div class="img-wrap">
                <img
                  src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=400&q=60"
                  alt="Dell XPS 15"
                />
              </div>
              <div class="item-info">
                <h3>Dell XPS 15</h3>
                <p class="muted">Portátiles</p>
                <p class="price">$1899</p>
              </div>
              <div class="qty-controls" aria-label="Cantidad">
                <button class="qty">-</button>
                <span class="count">1</span>
                <button class="qty">+</button>
              </div>
            </article>
          </section>

          <aside class="order-summary">
            <h3>Resumen del pedido</h3>
            <dl>
              <div class="line">
                <dt>Subtotal</dt>
                <dd>$1899.00</dd>
              </div>
              <div class="line">
                <dt>Impuesto (10%)</dt>
                <dd>$189.90</dd>
              </div>
              <div class="line total">
                <dt>Total</dt>
                <dd>$2088.90</dd>
              </div>
            </dl>
            <button class="btn">Proceder al pago</button>
          </aside>
        </div>
      </main>

      <footer class="site-footer">
        <div class="container">
          <p>© 2026 TechWear Shop. All rights reserved.</p>
        </div>
      </footer>
    </div>
  </body>
</html>
